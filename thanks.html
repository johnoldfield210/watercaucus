<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Global Parliamentary Water Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --blue: #1B3A5C;
  --teal: #2BB5B2;
  --gold: #D4A843;
  --light: #F7F9FC;
  --white: #FFFFFF;
  --charcoal: #2D2D2D;
  --grey: #6B7280;
}
body {
  font-family: 'Inter', sans-serif;
  color: var(--charcoal);
  line-height: 1.7;
  background: var(--light);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.card {
  background: white;
  border-radius: 12px;
  padding: 56px 48px;
  max-width: 520px;
  text-align: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
}
.checkmark {
  width: 64px;
  height: 64px;
  background: var(--teal);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-size: 2rem;
  color: white;
}
h1 {
  font-family: 'Playfair Display', serif;
  color: var(--blue);
  font-size: 1.6rem;
  margin-bottom: 16px;
}
p {
  color: var(--grey);
  font-size: 1rem;
  margin-bottom: 32px;
  line-height: 1.7;
}
.btn {
  display: inline-block;
  background: var(--teal);
  color: white;
  padding: 13px 36px;
  border: none;
  border-radius: 6px;
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  text-decoration: none;
}
.btn:hover { background: #249E9B; }
</style>
</head>
<body>
<div class="card">
  <div class="checkmark">&#10003;</div>
  <h1>Thank You</h1>
  <p>Thank you for your submission. We will respond to you within 1&ndash;2 business days.</p>
  <a href="/" class="btn">Back to Home</a>
</div>
</body>
</html>
